<!DOCTYPE html>
<html>
<head>
    <title>SheRise</title>
    <meta charset="UTF-8">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #b39ddb, #90caf9);
            text-align: center;
        }

        h1 {
            color: purple;
            margin-top: 30px;
            font-size: 40px;
        }

        .subtitle {
            font-size: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            width: 500px;
            margin: 20px auto;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0px 8px 20px rgba(0,0,0,0.2);
        }

        input {
            width: 80%;
            padding: 10px;
            margin: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 20px;
            margin: 10px;
            border: none;
            border-radius: 8px;
            background: purple;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: darkmagenta;
        }

        .insight-card {
            background: white;
            width: 500px;
            margin: 20px auto;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0px 8px 20px rgba(0,0,0,0.2);
        }

        label {
            font-weight: bold;
        }

        #result {
            white-space: pre-line;
        }
    </style>
</head>

<body>

<h1 data-key="title">SheRise</h1>
<div class="subtitle" data-key="subtitle">
    AI Business Insight Assistant
</div>

<div class="card">

    <label data-key="selectLang">Select Language:</label>
    <select onchange="changeLanguage(this.value)">
        <option value="en">English</option>
        <option value="ta">தமிழ்</option>
    </select>

    <br><br>

    <button data-key="dailyBtn" onclick="showDaily()">Daily Sales</button>
    <button data-key="weeklyBtn" onclick="showWeekly()">Weekly Sales</button>

    <h3 id="entryTitle">Enter Today's Sales:</h3>

    <div id="inputArea">
        <input type="number" id="dailyInput" placeholder="Enter today's sales">
    </div>

    <button data-key="generateBtn" onclick="generateInsight()">
        Generate AI Insight
    </button>

</div>

<div class="insight-card">
    <h2 data-key="aiInsight">AI Insight</h2>
    <p id="result">
        Your insight will appear here.
    </p>
</div>

<script>

let currentMode = "daily";
let currentLang = "en";

const translations = {

    en: {
        title: "SheRise",
        subtitle: "AI Business Insight Assistant",
        selectLang: "Select Language:",
        dailyBtn: "Daily Sales",
        weeklyBtn: "Weekly Sales",
        enterToday: "Enter Today's Sales:",
        enterWeekly: "Enter Weekly Sales:",
        generateBtn: "Generate AI Insight",
        aiInsight: "AI Insight",
        placeholderToday: "Enter today's sales",
        days: ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"],
        total: "Total Weekly Sales",
        average: "Average Per Day",
        insight: "AI Insight",
        low: "Low sales detected. Offer discounts.",
        moderate: "Moderate sales. Try social media promotion.",
        high: "Great sales performance. Maintain strategy."
    },

    ta: {
        title: "SheRise",
        subtitle: "AI வணிக பகுப்பாய்வு உதவியாளர்",
        selectLang: "மொழியை தேர்வு செய்க:",
        dailyBtn: "தினசரி விற்பனை",
        weeklyBtn: "வாராந்திர விற்பனை",
        enterToday: "இன்றைய விற்பனையை உள்ளிடவும்:",
        enterWeekly: "வாராந்திர விற்பனையை உள்ளிடவும்:",
        generateBtn: "AI பகுப்பாய்வு உருவாக்கு",
        aiInsight: "AI பகுப்பாய்வு",
        placeholderToday: "இன்றைய விற்பனை உள்ளிடவும்",
        days: ["திங்கள்","செவ்வாய்","புதன்","வியாழன்","வெள்ளி","சனி","ஞாயிறு"],
        total: "மொத்த வார விற்பனை",
        average: "ஒரு நாளின் சராசரி",
        insight: "AI பகுப்பாய்வு",
        low: "குறைந்த விற்பனை. தள்ளுபடி வழங்கவும்.",
        moderate: "மிதமான விற்பனை. சமூக ஊடக விளம்பரம் செய்யவும்.",
        high: "சிறந்த விற்பனை. தற்போதைய திட்டத்தை தொடரவும்."
    }
};

function changeLanguage(lang) {
    currentLang = lang;

    document.querySelectorAll("[data-key]").forEach(el => {
        const key = el.getAttribute("data-key");
        el.innerText = translations[lang][key];
    });

    if(currentMode === "daily") {
        document.getElementById("dailyInput").placeholder =
            translations[lang].placeholderToday;
        document.getElementById("entryTitle").innerText =
            translations[lang].enterToday;
    } else {
        showWeekly();
    }
}

function showDaily() {

    currentMode = "daily";

    document.getElementById("entryTitle").innerText =
        translations[currentLang].enterToday;

    document.getElementById("inputArea").innerHTML =
        `<input type="number" id="dailyInput"
        placeholder="${translations[currentLang].placeholderToday}">`;
}

function showWeekly() {

    currentMode = "weekly";

    document.getElementById("entryTitle").innerText =
        translations[currentLang].enterWeekly;

    let inputs = "";

    for(let i=0; i<7; i++){
        inputs += `
            <label>${translations[currentLang].days[i]}</label><br>
            <input type="number" class="weekInput"><br><br>
        `;
    }

    document.getElementById("inputArea").innerHTML = inputs;
}

function generateInsight() {

    let resultText = "";

    if(currentMode === "daily") {

        let value = Number(document.getElementById("dailyInput").value);

        let insightText =
            value < 300 ? translations[currentLang].low :
            value < 700 ? translations[currentLang].moderate :
            translations[currentLang].high;

        resultText = insightText;

    } else {

        let inputs = document.querySelectorAll(".weekInput");
        let total = 0;

        inputs.forEach(input => {
            total += Number(input.value);
        });

        let average = Math.round(total / 7);

        let insightText =
            total < 2000 ? translations[currentLang].low :
            total < 4000 ? translations[currentLang].moderate :
            translations[currentLang].high;

        resultText =
            translations[currentLang].total + ": ₹" + total +
            "\n" +
            translations[currentLang].average + ": ₹" + average +
            "\n\n" +
            translations[currentLang].insight + ": " + insightText;
    }

    document.getElementById("result").innerText = resultText;
}

</script>

</body>
</html>
