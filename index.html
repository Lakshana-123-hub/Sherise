<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SheRise - AI Business Assistant</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: linear-gradient(to right, #e0c3fc, #8ec5fc);
            margin: 0;
            padding: 0;
        }
        h1 { color: purple; margin-top: 30px; }
        h3 { color: #444; }
        .container {
            background: white;
            padding: 25px;
            width: 400px;
            margin: 30px auto;
            border-radius: 12px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
        }
        input { padding: 10px; width: 80%; border-radius: 6px; border: 1px solid #ccc; margin-top:5px;}
        button {
            padding: 10px 20px;
            background-color: purple;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { background-color: darkviolet; }
        #result { margin-top: 15px; font-weight: bold; color: #333; }
        #weeklyTotal { margin-top: 5px; font-weight: bold; color: blue; }
        label { font-weight: bold; }
        .langSelect { margin-bottom: 20px; }
        .toggleButtons button { margin:5px; }
    </style>
</head>
<body>

<h1>SheRise</h1>
<h3 id="subheading">AI Business Insight Assistant</h3>

<div class="container">
    <div class="langSelect">
        <label>Select Language:</label>
        <select id="langSelect" onchange="updateLanguage()">
            <option value="en">English</option>
            <option value="ta">தமிழ்</option>
        </select>
    </div>

    <!-- Toggle Buttons -->
    <div class="toggleButtons">
        <button onclick="showDaily()">Daily Sales</button>
        <button onclick="showWeekly()">Weekly Sales</button>
    </div>

    <!-- Daily Sales Container -->
    <div id="dailyContainer">
        <h3 id="dailyLabel">Enter Today's Sales:</h3>
        <input type="number" id="dailySales" placeholder="Enter today's sales">
    </div>

    <!-- Weekly Sales Container -->
    <div id="weeklyContainer" style="display:none;">
        <h3 id="weeklyLabel">Enter Weekly Sales:</h3>
        <input type="number" id="day0" placeholder="Monday"><br>
        <input type="number" id="day1" placeholder="Tuesday"><br>
        <input type="number" id="day2" placeholder="Wednesday"><br>
        <input type="number" id="day3" placeholder="Thursday"><br>
        <input type="number" id="day4" placeholder="Friday"><br>
        <input type="number" id="day5" placeholder="Saturday"><br>
        <input type="number" id="day6" placeholder="Sunday"><br>
        <p id="weeklyTotal"></p>
    </div>

    <button onclick="generateInsight()" id="generateBtn" style="margin-top:10px;">Generate AI Insight</button>
</div>

<div class="container">
    <h2 id="resultHeading">AI Insight</h2>
    <p id="result">Your insight will appear here.</p>
</div>

<script>
function showDaily(){
    document.getElementById("dailyContainer").style.display = "block";
    document.getElementById("weeklyContainer").style.display = "none";
    document.getElementById("weeklyTotal").innerText = "";
}

function showWeekly(){
    document.getElementById("dailyContainer").style.display = "none";
    document.getElementById("weeklyContainer").style.display = "block";
}

function updateLanguage(){
    var lang = document.getElementById("langSelect").value;

    // Subheading
    document.getElementById("subheading").innerText = (lang=="en")?"AI Business Insight Assistant":"AI வணிக கருத்து உதவியாளர்";

    // Daily container
    document.getElementById("dailyLabel").innerText = (lang=="en")?"Enter Today's Sales:":"இன்றைய விற்பனையை உள்ளிடவும்:";

    // Weekly container
    document.getElementById("weeklyLabel").innerText = (lang=="en")?"Enter Weekly Sales:":"வாராந்திர விற்பனையை உள்ளிடவும்:";

    // Weekly placeholders
    var weeklyPlaceholders = (lang=="en")?
        ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"]:
        ["திங்கள்","செவ்வாய்","புதன்","வியாழன்","வெள்ளி","சனி","ஞாயிறு"];

    for(var i=0;i<7;i++){
        document.getElementById("day"+i).placeholder = weeklyPlaceholders[i];
    }

    // Generate button
    document.getElementById("generateBtn").innerText = (lang=="en")?"Generate AI Insight":"AI கருத்தை உருவாக்கவும்";

    // Result heading
    document.getElementById("resultHeading").innerText = (lang=="en")?"AI Insight":"AI கருத்து";
}

function generateInsight(){
    var lang = document.getElementById("langSelect").value;
    var result = document.getElementById("result");
    var sales = 0;

    if(document.getElementById("dailyContainer").style.display=="block"){
        sales = document.getElementById("dailySales").value;
        if(sales===""){ 
            result.innerText = (lang=="en")?"Please enter sales amount.":"விற்பனை அளவை உள்ளிடவும்."; 
            return; 
        }
        sales = Number(sales);
        document.getElementById("weeklyTotal").innerText = "";
    } else {
        var weeklySales = [];
        for(var i=0;i<7;i++){
            var val = document.getElementById("day"+i).value;
            if(val===""){ 
                result.innerText = (lang=="en")?"Please enter all 7 days sales.":"எல்லா 7 நாட்களின் விற்பனையை உள்ளிடவும்."; 
                return; 
            }
            weeklySales.push(Number(val));
        }
        sales = weeklySales.reduce((a,b)=>a+b,0);

        // Show weekly total
        document.getElementById("weeklyTotal").innerText = (lang=="en")?
            "Total Weekly Sales: " + sales:
            "மொத்த வாராந்திர விற்பனை: " + sales;
    }

    // AI Insight
    if(sales > 7000){
        result.innerText = (lang=="en")?"Excellent performance! Expand your product range.":"சிறந்த விற்பனை! உங்கள் பொருட்கள் வரம்பை விரிவாக்கவும்.";
    }
    else if(sales > 4000){
        result.innerText = (lang=="en")?"Good sales. Promote best-selling products.":"நல்ல விற்பனை. சிறந்த விற்பனையுள்ள பொருட்களை விளம்பரம் செய்யவும்.";
    }
    else if(sales > 2000){
        result.innerText = (lang=="en")?"Moderate sales. Try social media promotion.":"மதாரமான விற்பனை. சமூக ஊடக விளம்பரத்தை முயற்சிக்கவும்.";
    }
    else{
        result.innerText = (lang=="en")?"Low sales detected. Offer discounts.":"குறைந்த விற்பனை கண்டறியப்பட்டது. தள்ளுபடிகள் வழங்கவும்.";
    }
}

// Initialize
updateLanguage();
</script>

</body>
</html>
